<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/><title>Space Tap Survival | GR8 GAMZ</title><style>:root{--green:#35ff8d;--cyan:#36d7ff;--pink:#ff3df2;--text:#f5fff9;--muted:#99a6b3}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at top,#17152d,#040407 55%,#000);color:var(--text);font-family:Inter,system-ui,sans-serif;touch-action:none;user-select:none}.game{height:100%;display:flex;flex-direction:column;gap:8px;padding:10px}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.stat{border:1px solid rgba(53,255,141,.3);background:rgba(255,255,255,.06);border-radius:14px;padding:8px 10px}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.11em}.stat strong{color:var(--green);font-size:18px}.wrap{flex:1;min-height:280px;position:relative;border:1px solid rgba(53,255,141,.38);border-radius:18px;overflow:hidden;background:#020304}canvas{width:100%;height:100%;display:block}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.66);z-index:5;text-align:center;padding:24px}.overlay.hidden{display:none}.card{max-width:430px;border:1px solid rgba(53,255,141,.3);border-radius:24px;padding:22px;background:rgba(8,12,18,.9)}h1{margin:0 0 8px;font-size:clamp(30px,8vw,52px);letter-spacing:-.06em;line-height:.95}p{color:var(--muted);line-height:1.45}button{min-height:50px;border:0;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--cyan));color:#001006;font-weight:950;padding:14px 20px}.tiny{text-align:center;color:var(--muted);font-size:12px}@media(min-width:720px){.hud{max-width:680px;width:100%;margin:0 auto}.wrap{max-width:900px;width:100%;margin:0 auto}}</style></head><body><main class="game"><section class="hud"><div class="stat"><span>Distance</span><strong id="dist">0</strong></div><div class="stat"><span>Shields</span><strong id="shield">0</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div></section><section id="wrap" class="wrap"><canvas id="c"></canvas><div id="overlay" class="overlay"><div class="card"><h1 id="title">Space Tap Survival</h1><p id="msg">Hold to fly upward. Release to fall. Dodge asteroids and collect shields.</p><button id="start">Start flight</button></div></div></section><div class="tiny">Mobile: hold the screen to fly. Release to fall.</div></main><script>
(function(){const ID='space-tap-survival',canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),wrap=document.getElementById('wrap'),overlay=document.getElementById('overlay'),startBtn=document.getElementById('start'),title=document.getElementById('title'),msg=document.getElementById('msg'),distEl=document.getElementById('dist'),shieldEl=document.getElementById('shield'),bestEl=document.getElementById('best');let W,H,dpr=1,ship,rocks=[],shields=[],dist=0,shield=0,best=Number(localStorage.getItem('gr8_best_'+ID)||0),running=false,holding=false,spawn=0,speed=3;bestEl.textContent=best;function resize(){const r=canvas.getBoundingClientRect();dpr=Math.min(2,devicePixelRatio||1);canvas.width=Math.floor(r.width*dpr);canvas.height=Math.floor(r.height*dpr);W=canvas.width;H=canvas.height;if(ship)ship.x=90*dpr}function start(){ship={x:90*dpr,y:H/2,vy:0,r:16*dpr};rocks=[];shields=[];dist=0;shield=0;spawn=0;speed=3*dpr;running=true;overlay.classList.add('hidden');hud()}function hud(){distEl.textContent=Math.floor(dist);shieldEl.textContent=shield;bestEl.textContent=best}function end(){running=false;if(dist>best){best=Math.floor(dist);localStorage.setItem('gr8_best_'+ID,best)}hud();title.textContent='Signal lost';msg.textContent='Distance '+Math.floor(dist)+'. Best '+best+'. Tap for another flight.';startBtn.textContent='Fly again';overlay.classList.remove('hidden');try{parent.postMessage({source:'GR8_GAMZ',type:'score',game:ID,score:Math.floor(dist),best},'*')}catch(e){}}function update(){if(!running)return;ship.vy += holding ? -.34*dpr : .24*dpr;ship.vy=Math.max(-6*dpr,Math.min(7*dpr,ship.vy));ship.y+=ship.vy;if(ship.y<ship.r||ship.y>H-ship.r){end();return}dist+=.12*speed/dpr;spawn--;if(spawn<=0){spawn=38;rocks.push({x:W+40*dpr,y:40*dpr+Math.random()*(H-80*dpr),r:(16+Math.random()*18)*dpr});if(Math.random()<.28)shields.push({x:W+80*dpr,y:50*dpr+Math.random()*(H-100*dpr),r:11*dpr})}rocks.forEach(r=>r.x-=speed);shields.forEach(s=>s.x-=speed*.95);rocks=rocks.filter(r=>r.x>-60*dpr);shields=shields.filter(s=>s.x>-60*dpr);for(const r of rocks){if(Math.hypot(r.x-ship.x,r.y-ship.y)<r.r+ship.r){if(shield>0){shield--;r.x=-999}else{end();return}}}shields=shields.filter(s=>{if(Math.hypot(s.x-ship.x,s.y-ship.y)<s.r+ship.r){shield++;return false}return true});hud()}function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#030608';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.28)';for(let i=0;i<55;i++){const x=(i*97+dist*12)%W;const y=(i*53)%H;ctx.fillRect(x,y,2*dpr,2*dpr)}ctx.shadowBlur=16*dpr;rocks.forEach(r=>{ctx.shadowColor='#ff3df2';ctx.fillStyle='#ff3df2';ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.fill()});shields.forEach(s=>{ctx.shadowColor='#35ff8d';ctx.strokeStyle='#35ff8d';ctx.lineWidth=3*dpr;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke()});if(ship){ctx.shadowColor='#36d7ff';ctx.fillStyle='#36d7ff';ctx.beginPath();ctx.moveTo(ship.x+22*dpr,ship.y);ctx.lineTo(ship.x-16*dpr,ship.y-16*dpr);ctx.lineTo(ship.x-8*dpr,ship.y);ctx.lineTo(ship.x-16*dpr,ship.y+16*dpr);ctx.closePath();ctx.fill()}ctx.shadowBlur=0}function loop(){update();draw();requestAnimationFrame(loop)}resize();addEventListener('resize',resize);startBtn.onclick=start;wrap.addEventListener('pointerdown',e=>{e.preventDefault();if(!running)start();holding=true});wrap.addEventListener('pointerup',()=>holding=false);wrap.addEventListener('pointercancel',()=>holding=false);addEventListener('keydown',e=>{if(e.code==='Space'){if(!running)start();holding=true}});addEventListener('keyup',e=>{if(e.code==='Space')holding=false});requestAnimationFrame(loop)})();</script></body></html>
