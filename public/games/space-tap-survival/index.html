<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/><title>Space Tap Survival | GR8 GAMZ</title><style>
:root{--green:#35ff8d;--cyan:#36d7ff;--pink:#ff3df2;--text:#f5fff9;--muted:#9aa6b2;--line:rgba(255,255,255,.14)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02020a;color:var(--text);font-family:Inter,system-ui,Segoe UI,sans-serif;touch-action:none;user-select:none}.game{height:100%;display:flex;flex-direction:column;gap:8px;padding:10px;background:radial-gradient(circle at top,#16103d,#02020a 64%,#000)}.hud{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.06);padding:8px 10px}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.1em}.stat strong{font-size:18px;color:var(--cyan)}.stage{flex:1;min-height:250px;position:relative;border:1px solid rgba(255,61,242,.32);border-radius:18px;overflow:hidden;background:#02020a}canvas{width:100%;height:100%;display:block;touch-action:none}.fly{min-height:62px;border-radius:18px;border:1px solid rgba(53,255,141,.48);background:linear-gradient(135deg,var(--green),var(--cyan));color:#001006;font-size:17px;font-weight:950}.overlay{position:absolute;inset:0;display:grid;place-items:center;text-align:center;background:rgba(0,0,0,.72);padding:22px}.overlay[hidden]{display:none}.card{max-width:440px;border:1px solid var(--line);border-radius:24px;background:rgba(8,12,20,.92);padding:22px}h1{margin:0 0 8px;font-size:clamp(28px,8vw,44px);line-height:.95;letter-spacing:-.06em}p{margin:0 0 16px;color:var(--muted);line-height:1.45}.hint{text-align:center;color:var(--muted);font-size:12px}@media(min-width:760px){.game{padding:14px}.hud,.stage{max-width:760px;width:100%;margin:0 auto}.fly,.hint{display:none}}
</style></head><body><main class="game" aria-label="Space Tap Survival game"><section class="hud"><div class="stat"><span>Distance</span><strong id="score">0</strong></div><div class="stat"><span>Shield</span><strong id="shield">0</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div></section><section class="stage"><canvas id="c"></canvas><div id="overlay" class="overlay"><div class="card"><h1>Space Tap Survival</h1><p>Hold to thrust upward, release to drift down. Dodge asteroids, grab shields and survive one more sector.</p><button class="fly" id="start">Launch</button></div></div></section><button class="fly" id="fly">HOLD TO THRUST</button><div class="hint">Mobile: hold to rise, release to fall. Desktop: hold space/up.</div></main><script>
const GAME_ID='space-tap-survival',canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),scoreEl=document.getElementById('score'),shieldEl=document.getElementById('shield'),bestEl=document.getElementById('best'),overlay=document.getElementById('overlay');let W=420,H=650,scale=1,dpr=1,ship,rocks,pickups,stars,score,shield,best=Number(localStorage.getItem('gr8_best_'+GAME_ID)||0),hold=false,running=false,over=false,spawn=0,last=0;bestEl.textContent=best;function resize(){const r=canvas.getBoundingClientRect();dpr=Math.min(2,devicePixelRatio||1);canvas.width=Math.max(320,Math.floor(r.width*dpr));canvas.height=Math.max(260,Math.floor(r.height*dpr));scale=Math.min(canvas.width/W,canvas.height/H)}addEventListener('resize',resize,{passive:true});resize();stars=Array.from({length:70},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5}));function reset(){ship={x:86,y:H/2,vy:0,r:17};rocks=[];pickups=[];score=0;shield=0;spawn=0;running=true;over=false;overlay.hidden=true;update()}function update(){scoreEl.textContent=Math.floor(score);shieldEl.textContent=shield;bestEl.textContent=best}function end(){if(shield>0){shield--;rocks=[];ship.y=H/2;ship.vy=0;update();return}running=false;over=true;if(score>best){best=Math.floor(score);localStorage.setItem('gr8_best_'+GAME_ID,best)}window.parent?.postMessage({source:'GR8_GAMZ',type:'score',game:GAME_ID,score:Math.floor(score),best},'*');overlay.querySelector('h1').textContent='Sector lost';overlay.querySelector('p').textContent=`Distance ${Math.floor(score)}. Best ${best}. Launch again for a longer survival run.`;overlay.querySelector('button').textContent='Launch again';overlay.hidden=false;update()}document.getElementById('start').addEventListener('click',reset);const fly=document.getElementById('fly');fly.addEventListener('pointerdown',e=>{e.preventDefault();if(!running)reset();hold=true});['pointerup','pointercancel','pointerleave'].forEach(ev=>fly.addEventListener(ev,()=>hold=false));canvas.addEventListener('pointerdown',e=>{e.preventDefault();if(!running){reset();return}hold=true});['pointerup','pointercancel','pointerleave'].forEach(ev=>canvas.addEventListener(ev,()=>hold=false));addEventListener('keydown',e=>{if(e.code==='Space'||e.key==='ArrowUp'){e.preventDefault();if(!running)reset();hold=true}});addEventListener('keyup',e=>{if(e.code==='Space'||e.key==='ArrowUp')hold=false});function hitCircle(a,b,extra=0){return Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r+extra}function tick(dt){if(!running||over)return;const speed=3.2+Math.min(4,score/850);score+=dt*.045*speed;ship.vy+=(hold?-0.34:0.24);ship.vy=Math.max(-6,Math.min(6,ship.vy));ship.y+=ship.vy;if(ship.y<25||ship.y>H-25)end();spawn-=dt;if(spawn<=0){spawn=720-Math.min(340,score/5);rocks.push({x:W+35,y:40+Math.random()*(H-80),r:18+Math.random()*24,rot:Math.random()*6});if(Math.random()<.32)pickups.push({x:W+60,y:50+Math.random()*(H-100),r:12})}rocks.forEach(r=>{r.x-=speed;r.rot+=.02});pickups.forEach(p=>p.x-=speed);stars.forEach(s=>{s.x-=s.s*speed*.2;if(s.x<0){s.x=W;s.y=Math.random()*H}});rocks=rocks.filter(r=>r.x>-80);pickups=pickups.filter(p=>p.x>-40);rocks.forEach(r=>{if(hitCircle(ship,r,-4))end()});pickups=pickups.filter(p=>{if(hitCircle(ship,p,4)){shield=Math.min(3,shield+1);score+=90;return false}return true});update()}function drawRock(r){ctx.save();ctx.translate(r.x,r.y);ctx.rotate(r.rot);ctx.shadowColor='#ff3df2';ctx.shadowBlur=14;ctx.fillStyle='#5d3165';ctx.strokeStyle='#ff3df2';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<8;i++){const a=i*Math.PI/4,rad=r.r*(.75+Math.sin(i*2.1)*.18);ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad)}ctx.closePath();ctx.fill();ctx.stroke();ctx.restore()}function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate((canvas.width-W*scale)/2,(canvas.height-H*scale)/2);ctx.scale(scale,scale);ctx.fillStyle='#02020a';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.75)';stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s));pickups.forEach(p=>{ctx.shadowColor='#35ff8d';ctx.shadowBlur=18;ctx.fillStyle='#35ff8d';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()});rocks.forEach(drawRock);ctx.save();ctx.translate(ship.x,ship.y);ctx.shadowColor=shield>0?'#35ff8d':'#36d7ff';ctx.shadowBlur=22;ctx.fillStyle='#36d7ff';ctx.beginPath();ctx.moveTo(22,0);ctx.lineTo(-18,-14);ctx.lineTo(-10,0);ctx.lineTo(-18,14);ctx.closePath();ctx.fill();if(hold){ctx.fillStyle='#ffb84d';ctx.beginPath();ctx.moveTo(-18,-8);ctx.lineTo(-38,0);ctx.lineTo(-18,8);ctx.fill()}if(shield>0){ctx.strokeStyle='#35ff8d';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,29,0,Math.PI*2);ctx.stroke()}ctx.restore();ctx.shadowBlur=0;ctx.restore()}function loop(t){const dt=Math.min(32,t-last||16);last=t;tick(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script></body></html>
