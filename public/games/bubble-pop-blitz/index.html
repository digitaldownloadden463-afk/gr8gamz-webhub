<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Bubble Pop Blitz</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050507;color:#f8fafc;font-family:Arial,Helvetica,sans-serif;touch-action:none;user-select:none}canvas{position:fixed;inset:0;width:100%;height:100%;background:#050507}.hud{position:fixed;top:10px;left:10px;right:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;z-index:4}.hud div{padding:9px;border:1px solid rgba(53,255,141,.25);border-radius:14px;background:rgba(5,5,7,.68)}.hud span{display:block;color:#a1a1aa;font-size:.68rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase}.hud b{display:block;color:#35ff8d;font-size:1.1rem}.overlay{position:fixed;inset:0;z-index:10;display:grid;place-items:center;padding:18px;background:linear-gradient(180deg,rgba(5,5,7,.88),rgba(5,5,7,.72));text-align:center}.card{width:min(850px,94vw);border:1px solid rgba(53,255,141,.24);border-radius:28px;padding:clamp(22px,4vw,42px);background:radial-gradient(circle at 0 0,rgba(53,255,141,.18),transparent 18rem),radial-gradient(circle at 100% 0,rgba(255,47,125,.14),transparent 18rem),rgba(13,13,19,.9);box-shadow:0 30px 100px #000}.k{display:inline-flex;color:#35ff8d;border:1px solid rgba(53,255,141,.24);background:rgba(53,255,141,.08);border-radius:999px;padding:7px 10px;font-weight:900;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase}h1{font-size:clamp(2.1rem,9vw,4.9rem);line-height:.9;letter-spacing:-.07em;margin:15px 0}p{color:#a1a1aa;line-height:1.55}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}.choice{cursor:pointer;text-align:left;padding:13px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#f8fafc}.choice.active{border-color:#35ff8d;box-shadow:0 0 28px rgba(53,255,141,.14)}.choice b{display:block;color:#35ff8d;margin-bottom:5px}button{border:0;border-radius:999px;min-height:46px;padding:0 20px;font-weight:900;cursor:pointer}.primary{background:#35ff8d;color:#041008}.secondary{background:rgba(255,255,255,.07);color:#fff;border:1px solid rgba(255,255,255,.14)}.toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;color:white;font-weight:900;font-size:clamp(2rem,8vw,5rem);text-shadow:0 0 30px #35ff8d;opacity:0}.toast.show{animation:pop .7s ease}@keyframes pop{0%{opacity:0;transform:translate(-50%,-40%) scale(.8)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.06)}100%{opacity:0;transform:translate(-50%,-72%) scale(1)}}@media(max-width:680px){.hud{grid-template-columns:repeat(2,1fr)}.choices{grid-template-columns:1fr}}</style></head><body><canvas id="c"></canvas><div class="hud"><div><span>Score</span><b id="score">0</b></div><div><span>Best</span><b id="best">0</b></div><div><span>Run</span><b id="time">0s</b></div><div><span>Mode</span><b id="mode">GR8</b></div></div><div id="toast" class="toast"></div><div id="overlay" class="overlay"><div class="card"><span class="k">GR8 second drop</span><h1>Bubble Pop Blitz</h1><p>Choose a power mode, tap matching neon groups and trigger satisfying combo bursts.</p><div id="choices" class="choices"></div><button class="primary" id="start">Start run</button> <button class="secondary" id="how">How to play</button><p id="help" style="display:none">Mobile: tap connected matching items • Bigger groups score more • Desktop: click groups to clear</p></div></div><script>const CFG={"id": "bubble-pop-blitz", "name": "Bubble Pop Blitz", "mode": "tapgrid", "choices": [{"name": "Balanced", "short": "BASE", "desc": "Balanced style.", "bonus": 1}, {"name": "Quick", "short": "QUICK", "desc": "Faster feel, extra score.", "bonus": 1.18}, {"name": "Pro", "short": "PRO", "desc": "Harder run, bigger reward.", "bonus": 1.38}]};</script><script src="game.js"></script></body></html>
