<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Neon Snake Rush | GR8 GAMZ</title>
<style>
:root{--bg:#040407;--panel:#0d1118;--line:rgba(53,255,141,.28);--green:#35ff8d;--cyan:#36d7ff;--pink:#ff3df2;--text:#f5fff9;--muted:#99a6b3}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at top,#11251b 0,#040407 52%,#000 100%);color:var(--text);font-family:Inter,system-ui,Segoe UI,sans-serif;touch-action:none;user-select:none}.game{height:100%;display:flex;flex-direction:column;gap:8px;padding:10px}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.stat{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:14px;padding:8px 10px;box-shadow:0 0 24px rgba(53,255,141,.08)}.stat span{display:block;color:var(--muted);font-size:11px;letter-spacing:.11em;text-transform:uppercase}.stat strong{font-size:18px;color:var(--green)}.canvas-wrap{flex:1;min-height:240px;position:relative;border:1px solid rgba(53,255,141,.38);border-radius:18px;overflow:hidden;background:#020304;box-shadow:inset 0 0 60px rgba(53,255,141,.06),0 0 25px rgba(53,255,141,.1)}canvas{width:100%;height:100%;display:block;touch-action:none}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:linear-gradient(180deg,rgba(0,0,0,.82),rgba(0,0,0,.58));text-align:center;padding:24px;z-index:5}.overlay.hidden{display:none}.card{max-width:440px;border:1px solid var(--line);border-radius:24px;padding:22px;background:rgba(8,12,18,.9);box-shadow:0 0 45px rgba(53,255,141,.13)}h1{margin:0 0 8px;font-size:clamp(28px,8vw,48px);line-height:.95;letter-spacing:-.06em}p{color:var(--muted);line-height:1.45;margin:0 0 16px}button{cursor:pointer;border:1px solid rgba(53,255,141,.4);border-radius:16px;background:linear-gradient(135deg,var(--green),var(--cyan));color:#001006;font-weight:950;padding:14px 18px;min-height:48px;font-size:15px}.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:360px;margin:0 auto;width:100%}.controls button{background:rgba(255,255,255,.08);color:var(--text);border-color:rgba(255,255,255,.16);font-size:22px;padding:10px;min-height:54px;box-shadow:none}.controls .up{grid-column:2}.controls .left{grid-column:1}.controls .down{grid-column:2}.controls .right{grid-column:3}.tiny{text-align:center;color:var(--muted);font-size:12px}@media(min-width:720px){.game{padding:14px}.controls{display:none}.hud{max-width:680px;width:100%;margin:0 auto}.canvas-wrap{max-width:900px;width:100%;margin:0 auto}.tiny{display:none}}
</style></head>
<body><main class="game"><section class="hud"><div class="stat"><span>Score</span><strong id="score">0</strong></div><div class="stat"><span>Combo</span><strong id="combo">x1</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div></section><section class="canvas-wrap"><canvas id="c"></canvas><div class="overlay" id="overlay"><div class="card"><h1 id="ot">Neon Snake Rush</h1><p id="op">Swipe, tap arrows, or use keys. Collect glowing orbs, grow longer, and chase a new score.</p><button id="start">Start run</button></div></div></section><section class="controls"><button class="up" data-d="0,-1">▲</button><button class="left" data-d="-1,0">◀</button><button class="down" data-d="0,1">▼</button><button class="right" data-d="1,0">▶</button></section><div class="tiny">Mobile: swipe anywhere on the game area or use the large touch arrows.</div></main>
<script>
(function(){
const ID='neon-snake-rush', COLS=24, ROWS=16; const canvas=document.getElementById('c'), ctx=canvas.getContext('2d'); const overlay=document.getElementById('overlay'), startBtn=document.getElementById('start'), ot=document.getElementById('ot'), op=document.getElementById('op'); const scoreEl=document.getElementById('score'), comboEl=document.getElementById('combo'), bestEl=document.getElementById('best');
let dpr=1, cell=20, ox=0, oy=0, snake=[], dir={x:1,y:0}, nextDir={x:1,y:0}, food={x:12,y:8}, score=0, combo=1, best=Number(localStorage.getItem('gr8_best_'+ID)||0), running=false, acc=0, tick=120, last=performance.now(), lastEat=0;
bestEl.textContent=best;
function resize(){const r=canvas.getBoundingClientRect(); dpr=Math.min(2,window.devicePixelRatio||1); canvas.width=Math.max(320,Math.floor(r.width*dpr)); canvas.height=Math.max(240,Math.floor(r.height*dpr)); cell=Math.floor(Math.min(canvas.width/COLS, canvas.height/ROWS)); ox=Math.floor((canvas.width-COLS*cell)/2); oy=Math.floor((canvas.height-ROWS*cell)/2)}
function rnd(){let p; do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}while(snake.some(s=>s.x===p.x&&s.y===p.y)); return p}
function hud(){scoreEl.textContent=score; comboEl.textContent='x'+combo; bestEl.textContent=best}
function start(){snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}]; dir={x:1,y:0}; nextDir={x:1,y:0}; food=rnd(); score=0; combo=1; tick=120; acc=0; lastEat=performance.now(); running=true; overlay.classList.add('hidden'); hud()}
function end(){running=false; if(score>best){best=score; localStorage.setItem('gr8_best_'+ID,best)} hud(); ot.textContent='Run over'; op.textContent='Score '+score+'. Best '+best+'. Tap to chase it again.'; startBtn.textContent='Play again'; overlay.classList.remove('hidden'); try{parent.postMessage({source:'GR8_GAMZ',type:'score',game:ID,score,best},'*')}catch(e){}}
function setDir(x,y){if(!running){start();return} if(x+dir.x===0&&y+dir.y===0)return; nextDir={x,y}}
function step(){dir=nextDir; const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y}; if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y)){end();return} snake.unshift(h); if(h.x===food.x&&h.y===food.y){const now=performance.now(); combo=(now-lastEat<2800)?Math.min(9,combo+1):1; lastEat=now; score+=10*combo; food=rnd(); tick=Math.max(65,tick-2)} else snake.pop(); hud()}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#030608'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.strokeStyle='rgba(53,255,141,.08)'; ctx.lineWidth=1; for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(ox+x*cell,oy);ctx.lineTo(ox+x*cell,oy+ROWS*cell);ctx.stroke()} for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(ox,oy+y*cell);ctx.lineTo(ox+COLS*cell,oy+y*cell);ctx.stroke()} ctx.shadowColor='#35ff8d';ctx.shadowBlur=16;ctx.fillStyle='#35ff8d';ctx.beginPath();ctx.arc(ox+(food.x+.5)*cell,oy+(food.y+.5)*cell,cell*.32,0,Math.PI*2);ctx.fill(); snake.forEach((s,i)=>{ctx.shadowColor=i?'#35ff8d':'#36d7ff';ctx.shadowBlur=i?10:20;ctx.fillStyle=i?'#35ff8d':'#36d7ff';const p=Math.max(2,cell*.12);ctx.fillRect(ox+s.x*cell+p,oy+s.y*cell+p,cell-p*2,cell-p*2)}); ctx.shadowBlur=0}
function loop(t){const dt=t-last; last=t; if(running){acc+=dt; while(acc>tick){step(); acc-=tick}} draw(); requestAnimationFrame(loop)}
window.addEventListener('resize',resize,{passive:true}); resize(); startBtn.addEventListener('click',start); document.querySelectorAll('[data-d]').forEach(b=>b.addEventListener('pointerdown',e=>{e.preventDefault(); const a=b.dataset.d.split(',').map(Number); setDir(a[0],a[1])})); window.addEventListener('keydown',e=>{const k=e.key.toLowerCase(); if(k==='arrowup'||k==='w')setDir(0,-1); if(k==='arrowdown'||k==='s')setDir(0,1); if(k==='arrowleft'||k==='a')setDir(-1,0); if(k==='arrowright'||k==='d')setDir(1,0); if(k===' ')start()}); let sx=0,sy=0; canvas.addEventListener('touchstart',e=>{const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY;e.preventDefault()},{passive:false}); canvas.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;if(Math.max(Math.abs(dx),Math.abs(dy))<18){if(!running)start();return} if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?1:-1,0);else setDir(0,dy>0?1:-1);e.preventDefault()},{passive:false}); requestAnimationFrame(loop);
})();
</script></body></html>
