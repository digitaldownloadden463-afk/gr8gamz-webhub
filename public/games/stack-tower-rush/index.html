<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Stack Tower Rush | GR8 GAMZ</title>
  <style>
    :root{--bg:#050407;--green:#35ff8d;--cyan:#36d7ff;--pink:#ff3df2;--text:#f5fff9;--muted:#a5adba;--line:rgba(255,255,255,.14)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% -20%,#22123d,#050407 60%,#000);font-family:Inter,system-ui,Segoe UI,sans-serif;color:var(--text);touch-action:none;user-select:none}
    .game{height:100%;display:flex;flex-direction:column;gap:8px;padding:10px}.hud{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.06);padding:8px 10px}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.1em}.stat strong{font-size:18px;color:var(--cyan)}
    .stage{flex:1;min-height:250px;position:relative;border:1px solid rgba(54,215,255,.35);border-radius:18px;overflow:hidden;background:#04060e;box-shadow:inset 0 0 70px rgba(54,215,255,.07)}canvas{width:100%;height:100%;display:block;touch-action:none}.big-btn{border:1px solid rgba(53,255,141,.5);border-radius:18px;min-height:58px;background:linear-gradient(135deg,var(--green),var(--cyan));color:#001006;font-weight:950;font-size:17px;box-shadow:0 0 26px rgba(53,255,141,.16)}
    .overlay{position:absolute;inset:0;display:grid;place-items:center;text-align:center;background:rgba(0,0,0,.72);padding:22px}.overlay[hidden]{display:none}.card{max-width:440px;border:1px solid rgba(255,255,255,.16);border-radius:24px;background:rgba(10,12,20,.9);padding:22px}h1{margin:0 0 8px;font-size:clamp(28px,8vw,44px);line-height:.95;letter-spacing:-.06em}p{margin:0 0 16px;color:var(--muted);line-height:1.45}.tiny{text-align:center;color:var(--muted);font-size:12px}
    @media(min-width:720px){.game{padding:14px}.hud,.stage{max-width:780px;width:100%;margin:0 auto}.big-btn{display:none}.tiny{display:none}}
  </style>
</head>
<body>
  <main class="game" aria-label="Stack Tower Rush game">
    <section class="hud"><div class="stat"><span>Height</span><strong id="score">0</strong></div><div class="stat"><span>Perfect</span><strong id="combo">0</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div></section>
    <section class="stage"><canvas id="c"></canvas><div id="overlay" class="overlay"><div class="card"><h1>Stack Tower Rush</h1><p>Tap anywhere to drop the moving block. Perfect stacks keep your combo alive. Miss the tower and the run ends.</p><button class="big-btn" id="start">Start stacking</button></div></div></section>
    <button class="big-btn" id="drop">Tap to drop block</button><div class="tiny">Mobile: tap the screen or button. Desktop: space/click.</div>
  </main>
<script>
const GAME_ID='stack-tower-rush', canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score'), comboEl=document.getElementById('combo'), bestEl=document.getElementById('best'), overlay=document.getElementById('overlay');
let dpr=1,W=360,H=600,scale=1,blocks,current,score,perfect,best=Number(localStorage.getItem('gr8_best_'+GAME_ID)||0),running=false,gameOver=false,camera=0,last=0;
bestEl.textContent=best;
function resize(){const r=canvas.getBoundingClientRect();dpr=Math.min(2,devicePixelRatio||1);canvas.width=Math.max(320,Math.floor(r.width*dpr));canvas.height=Math.max(260,Math.floor(r.height*dpr));scale=Math.min(canvas.width/W,canvas.height/H);}
addEventListener('resize',resize,{passive:true});resize();
function makeCurrent(){const prev=blocks[blocks.length-1];const fromLeft=Math.random()<.5;current={x:fromLeft?-prev.w:W+prev.w,y:prev.y-34,w:prev.w,h:30,dir:fromLeft?1:-1,speed:2.2+score*.08+Math.min(3,perfect*.18),active:true};}
function reset(){blocks=[{x:60,y:540,w:240,h:30,color:'#35ff8d'}];score=0;perfect=0;running=true;gameOver=false;camera=0;makeCurrent();overlay.hidden=true;updateHud();}
function updateHud(){scoreEl.textContent=score;comboEl.textContent=perfect;bestEl.textContent=best;}
function end(){running=false;gameOver=true;if(score>best){best=score;localStorage.setItem('gr8_best_'+GAME_ID,best)}window.parent?.postMessage({source:'GR8_GAMZ',type:'score',game:GAME_ID,score,best},'*');overlay.querySelector('h1').textContent='Tower dropped';overlay.querySelector('p').textContent=`Height ${score}. Best ${best}. Tap start and build higher.`;overlay.querySelector('button').textContent='Stack again';overlay.hidden=false;updateHud();}
function drop(){if(!running||gameOver){reset();return}const prev=blocks[blocks.length-1];const left=Math.max(current.x,prev.x);const right=Math.min(current.x+current.w,prev.x+prev.w);let overlap=right-left;if(overlap<=8){end();return}const centerDelta=Math.abs((current.x+current.w/2)-(prev.x+prev.w/2));if(centerDelta<7){overlap=prev.w;current.x=prev.x;perfect++;}else{perfect=0;}blocks.push({x:left,y:current.y,w:overlap,h:30,color:perfect>0?'#36d7ff':'#35ff8d'});score++;makeCurrent();updateHud();}
document.getElementById('start').addEventListener('click',reset);document.getElementById('drop').addEventListener('pointerdown',e=>{e.preventDefault();drop()});canvas.addEventListener('pointerdown',e=>{e.preventDefault();drop()});addEventListener('keydown',e=>{if(e.code==='Space'||e.key==='Enter'){e.preventDefault();drop()}});
function tick(){if(running&&!gameOver){current.x+=current.dir*current.speed;if(current.dir>0&&current.x>W-current.w*.25)current.dir=-1;if(current.dir<0&&current.x<-current.w*.75)current.dir=1;camera+=(Math.min(0,current.y-250)-camera)*.09;}}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();ctx.stroke();}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate((canvas.width-W*scale)/2,(canvas.height-H*scale)/2);ctx.scale(scale,scale);const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0a0920');g.addColorStop(1,'#020306');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(54,215,255,.08)';for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}ctx.translate(0,-camera);[...blocks,current].forEach((b,i)=>{if(!b)return;ctx.shadowColor=b.color||'#ff3df2';ctx.shadowBlur=18;ctx.fillStyle=b.color||'#ff3df2';ctx.strokeStyle='rgba(255,255,255,.34)';rr(b.x,b.y,b.w,b.h,8)});ctx.shadowBlur=0;ctx.restore();}
function loop(t){if(t-last>16){tick();last=t}draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);draw();
</script>
</body>
</html>
