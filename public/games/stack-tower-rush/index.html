<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/><title>Stack Tower Rush | GR8 GAMZ</title><style>:root{--green:#35ff8d;--cyan:#36d7ff;--pink:#ff3df2;--text:#f5fff9;--muted:#99a6b3}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at top,#152216,#040407 58%,#000);color:var(--text);font-family:Inter,system-ui,sans-serif;touch-action:none;user-select:none}.game{height:100%;display:flex;flex-direction:column;padding:10px;gap:8px}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.stat{border:1px solid rgba(53,255,141,.3);background:rgba(255,255,255,.06);border-radius:14px;padding:8px 10px}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.11em}.stat strong{color:var(--green);font-size:18px}.wrap{flex:1;position:relative;min-height:280px;border:1px solid rgba(53,255,141,.38);border-radius:18px;overflow:hidden;background:#020304}canvas{display:block;width:100%;height:100%}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.66);z-index:5;padding:24px;text-align:center}.overlay.hidden{display:none}.card{max-width:420px;border:1px solid rgba(53,255,141,.3);border-radius:24px;padding:22px;background:rgba(8,12,18,.9)}h1{margin:0 0 8px;font-size:clamp(30px,8vw,52px);letter-spacing:-.06em;line-height:.95}p{color:var(--muted);line-height:1.45}button{min-height:50px;border:0;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--cyan));color:#001006;font-weight:950;padding:14px 20px;font-size:15px}.tap{color:var(--muted);text-align:center;font-size:12px}@media(min-width:720px){.hud{max-width:680px;width:100%;margin:0 auto}.wrap{max-width:900px;width:100%;margin:0 auto}}</style></head><body><main class="game"><section class="hud"><div class="stat"><span>Height</span><strong id="height">0</strong></div><div class="stat"><span>Perfect</span><strong id="perfect">0</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div></section><section class="wrap"><canvas id="c"></canvas><div id="overlay" class="overlay"><div class="card"><h1 id="title">Stack Tower Rush</h1><p id="msg">Tap anywhere at the perfect moment. Stack blocks higher and higher.</p><button id="start">Start stacking</button></div></div></section><div class="tap">Mobile: tap anywhere to drop. Desktop: click or press Space.</div></main><script>
(function(){const ID='stack-tower-rush',canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),overlay=document.getElementById('overlay'),startBtn=document.getElementById('start'),title=document.getElementById('title'),msg=document.getElementById('msg'),hEl=document.getElementById('height'),pEl=document.getElementById('perfect'),bEl=document.getElementById('best');let W=0,H=0,dpr=1,blocks=[],moving=null,dir=1,speed=2.4,cam=0,height=0,perfect=0,best=Number(localStorage.getItem('gr8_best_'+ID)||0),running=false; bEl.textContent=best;function resize(){const r=canvas.getBoundingClientRect();dpr=Math.min(2,devicePixelRatio||1);canvas.width=Math.floor(r.width*dpr);canvas.height=Math.floor(r.height*dpr);W=canvas.width;H=canvas.height}function start(){blocks=[{x:W/2-70*dpr,y:H-55*dpr,w:140*dpr,h:28*dpr,c:'#35ff8d'}];moving={x:20*dpr,y:H-105*dpr,w:140*dpr,h:28*dpr,c:'#36d7ff'};dir=1;speed=2.8*dpr;cam=0;height=0;perfect=0;running=true;overlay.classList.add('hidden');hud()}function hud(){hEl.textContent=height;pEl.textContent=perfect;bEl.textContent=best}function drop(){if(!running){start();return}const last=blocks[blocks.length-1];const overlap=Math.min(moving.x+moving.w,last.x+last.w)-Math.max(moving.x,last.x);if(overlap<=8*dpr){end();return}const miss=Math.abs((moving.x+moving.w/2)-(last.x+last.w/2));if(miss<6*dpr)perfect++;const nx=Math.max(moving.x,last.x);blocks.push({x:nx,y:moving.y,w:overlap,h:moving.h,c:perfect%4===0?'#ff3df2':(blocks.length%2?'#35ff8d':'#36d7ff')});height++;const y=last.y-50*dpr;moving={x:dir>0?0:W-overlap,y:y,w:overlap,h:28*dpr,c:'#36d7ff'};speed+=.18*dpr;hud()}function end(){running=false;if(height>best){best=height;localStorage.setItem('gr8_best_'+ID,best)}hud();title.textContent='Tower dropped';msg.textContent='Height '+height+'. Best '+best+'. Tap to build again.';startBtn.textContent='Play again';overlay.classList.remove('hidden');try{parent.postMessage({source:'GR8_GAMZ',type:'score',game:ID,score:height,best},'*')}catch(e){}}function update(){if(running&&moving){moving.x+=speed*dir;if(moving.x<0){moving.x=0;dir=1}if(moving.x+moving.w>W){moving.x=W-moving.w;dir=-1}const target=Math.max(0,(blocks.length-5)*50*dpr);cam+=(target-cam)*.08}}function block(b){ctx.fillStyle=b.c;ctx.shadowColor=b.c;ctx.shadowBlur=18*dpr;ctx.fillRect(b.x,b.y+cam,b.w,b.h);ctx.shadowBlur=0}function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#030608';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(53,255,141,.08)';for(let y=0;y<H;y+=36*dpr){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}blocks.forEach(block); if(moving)block(moving)}function loop(){update();draw();requestAnimationFrame(loop)}resize();addEventListener('resize',resize);startBtn.onclick=start;canvas.addEventListener('pointerdown',e=>{e.preventDefault();drop()});addEventListener('keydown',e=>{if(e.code==='Space')drop()});requestAnimationFrame(loop)})();</script></body></html>
