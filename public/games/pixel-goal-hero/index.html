<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/><title>Pixel Goal Hero | GR8 GAMZ</title><style>
:root{--green:#35ff8d;--cyan:#36d7ff;--gold:#ffe66d;--red:#ff496f;--text:#f5fff9;--muted:#9aa6b2;--line:rgba(255,255,255,.15)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#030407;color:var(--text);font-family:Inter,system-ui,Segoe UI,sans-serif;touch-action:none;user-select:none}.game{height:100%;display:flex;flex-direction:column;gap:8px;padding:10px;background:radial-gradient(circle at top,#0a3320,#030407 58%,#000)}.hud{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.06);padding:8px 10px}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.1em}.stat strong{font-size:18px;color:var(--gold)}.stage{flex:1;min-height:260px;position:relative;border:1px solid rgba(53,255,141,.32);border-radius:18px;overflow:hidden;background:#073016}canvas{width:100%;height:100%;display:block;touch-action:none}.overlay{position:absolute;inset:0;display:grid;place-items:center;text-align:center;background:rgba(0,0,0,.7);padding:22px}.overlay[hidden]{display:none}.card{max-width:440px;border:1px solid var(--line);border-radius:24px;background:rgba(8,12,20,.92);padding:22px}h1{margin:0 0 8px;font-size:clamp(28px,8vw,44px);line-height:.95;letter-spacing:-.06em}p{margin:0 0 16px;color:var(--muted);line-height:1.45}button{min-height:54px;border-radius:18px;border:1px solid rgba(53,255,141,.5);background:linear-gradient(135deg,var(--green),var(--cyan));color:#001006;font-weight:950;font-size:16px;padding:14px 20px}.hint{text-align:center;color:var(--muted);font-size:12px}@media(min-width:760px){.game{padding:14px}.hud,.stage{max-width:760px;width:100%;margin:0 auto}.hint{display:none}}
</style></head><body><main class="game" aria-label="Pixel Goal Hero game"><section class="hud"><div class="stat"><span>Goals</span><strong id="score">0</strong></div><div class="stat"><span>Streak</span><strong id="streak">0</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div></section><section class="stage"><canvas id="c"></canvas><div id="overlay" class="overlay"><div class="card"><h1>Pixel Goal Hero</h1><p>Drag from the ball towards the goal, aim away from the keeper, then release to shoot. Score streaks make the keeper faster.</p><button id="start">Take first shot</button></div></div></section><div class="hint">Mobile: drag to aim, release to shoot. Desktop: mouse drag.</div></main><script>
const GAME_ID='pixel-goal-hero',canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),scoreEl=document.getElementById('score'),streakEl=document.getElementById('streak'),bestEl=document.getElementById('best'),overlay=document.getElementById('overlay');let W=420,H=650,scale=1,dpr=1,ball,keeper,aim,shooting=false,ready=false,score=0,streak=0,best=Number(localStorage.getItem('gr8_best_'+GAME_ID)||0),last=0,msg='';bestEl.textContent=best;function resize(){const r=canvas.getBoundingClientRect();dpr=Math.min(2,devicePixelRatio||1);canvas.width=Math.max(320,Math.floor(r.width*dpr));canvas.height=Math.max(260,Math.floor(r.height*dpr));scale=Math.min(canvas.width/W,canvas.height/H)}addEventListener('resize',resize,{passive:true});resize();function resetGame(){score=0;streak=0;newShot();overlay.hidden=true;update()}function newShot(){ball={x:W/2,y:H-70,r:12,vx:0,vy:0};keeper={x:W/2,y:142,w:74,h:22,dir:Math.random()<.5?-1:1,speed:2.2+Math.min(2.4,streak*.28)};aim=null;shooting=false;ready=true;msg='Drag to aim'}function update(){scoreEl.textContent=score;streakEl.textContent=streak;bestEl.textContent=best}function finish(text,goal){msg=text;if(goal){score++;streak++;}else{streak=0}if(score>best){best=score;localStorage.setItem('gr8_best_'+GAME_ID,best)}window.parent?.postMessage({source:'GR8_GAMZ',type:'score',game:GAME_ID,score,best},'*');update();setTimeout(newShot,900)}document.getElementById('start').addEventListener('click',resetGame);function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H}}canvas.addEventListener('pointerdown',e=>{e.preventDefault();if(overlay.hidden===false){resetGame();return}if(!ready||shooting)return;aim=pos(e)});canvas.addEventListener('pointermove',e=>{if(aim&&!shooting){e.preventDefault();aim=pos(e)}});canvas.addEventListener('pointerup',e=>{if(!aim||shooting||!ready)return;e.preventDefault();const p=pos(e);const dx=p.x-ball.x,dy=p.y-ball.y;const power=Math.min(13,Math.max(6,Math.hypot(dx,dy)/22));const ang=Math.atan2(dy,dx);if(dy>-18){msg='Aim towards the goal';aim=null;return}ball.vx=Math.cos(ang)*power;ball.vy=Math.sin(ang)*power;shooting=true;ready=false;aim=null});function tick(){keeper.x+=keeper.dir*keeper.speed;if(keeper.x<105||keeper.x>315)keeper.dir*=-1;if(shooting){ball.x+=ball.vx;ball.y+=ball.vy;ball.vy+=0.045;ball.vx*=0.995;if(ball.x<18||ball.x>W-18||ball.y>H+40){shooting=false;finish('Missed',false)}if(ball.y<188&&ball.y>120&&Math.abs(ball.x-keeper.x)<keeper.w/2+ball.r){shooting=false;finish('Saved!',false)}if(ball.y<78){shooting=false;if(ball.x>70&&ball.x<350)finish('GOAL!',true);else finish('Wide',false)}}}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate((canvas.width-W*scale)/2,(canvas.height-H*scale)/2);ctx.scale(scale,scale);ctx.fillStyle='#0c5528';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(255,255,255,.13)';ctx.lineWidth=3;ctx.strokeRect(38,50,344,570);ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(70,55,280,110);ctx.strokeStyle='white';ctx.lineWidth=5;ctx.strokeRect(70,55,280,110);ctx.strokeStyle='rgba(255,255,255,.2)';for(let x=88;x<350;x+=28){ctx.beginPath();ctx.moveTo(x,55);ctx.lineTo(x,165);ctx.stroke()}ctx.shadowColor='#ff496f';ctx.shadowBlur=18;ctx.fillStyle='#ff496f';ctx.fillRect(keeper.x-keeper.w/2,keeper.y-keeper.h/2,keeper.w,keeper.h);ctx.shadowColor='#ffe66d';ctx.shadowBlur=16;ctx.fillStyle='#ffe66d';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;if(aim&&!shooting){ctx.strokeStyle='#36d7ff';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(ball.x,ball.y);ctx.lineTo(aim.x,aim.y);ctx.stroke();ctx.fillStyle='#36d7ff';ctx.beginPath();ctx.arc(aim.x,aim.y,6,0,Math.PI*2);ctx.fill()}ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,H-34,W,34);ctx.fillStyle='#f5fff9';ctx.font='700 16px system-ui';ctx.textAlign='center';ctx.fillText(msg,W/2,H-12);ctx.restore()}function loop(t){if(t-last>16){tick();last=t}draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script></body></html>
