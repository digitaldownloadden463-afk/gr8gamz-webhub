<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/><title>Pixel Goal Hero | GR8 GAMZ</title><style>:root{--green:#35ff8d;--cyan:#36d7ff;--pink:#ff3df2;--text:#f5fff9;--muted:#99a6b3}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at top,#10251c,#040407 55%,#000);color:var(--text);font-family:Inter,system-ui,sans-serif;touch-action:none;user-select:none}.game{height:100%;display:flex;flex-direction:column;gap:8px;padding:10px}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.stat{border:1px solid rgba(53,255,141,.3);background:rgba(255,255,255,.06);border-radius:14px;padding:8px 10px}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.11em}.stat strong{color:var(--green);font-size:18px}.wrap{flex:1;min-height:280px;position:relative;border:1px solid rgba(53,255,141,.38);border-radius:18px;overflow:hidden;background:#020304}canvas{display:block;width:100%;height:100%}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.66);z-index:5;text-align:center;padding:24px}.overlay.hidden{display:none}.card{max-width:430px;border:1px solid rgba(53,255,141,.3);border-radius:24px;padding:22px;background:rgba(8,12,18,.9)}h1{margin:0 0 8px;font-size:clamp(30px,8vw,52px);letter-spacing:-.06em;line-height:.95}p{color:var(--muted);line-height:1.45}button{min-height:50px;border:0;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--cyan));color:#001006;font-weight:950;padding:14px 20px}.tiny{text-align:center;color:var(--muted);font-size:12px}@media(min-width:720px){.hud{max-width:680px;width:100%;margin:0 auto}.wrap{max-width:900px;width:100%;margin:0 auto}}</style></head><body><main class="game"><section class="hud"><div class="stat"><span>Goals</span><strong id="goals">0</strong></div><div class="stat"><span>Streak</span><strong id="streak">0</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div></section><section id="wrap" class="wrap"><canvas id="c"></canvas><div id="overlay" class="overlay"><div class="card"><h1 id="title">Pixel Goal Hero</h1><p id="msg">Drag from the ball to aim. Release to shoot past the moving keeper.</p><button id="start">Start penalties</button></div></div></section><div class="tiny">Mobile: drag from the ball and release. Desktop: click, drag and release.</div></main><script>
(function(){const ID='pixel-goal-hero',canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),wrap=document.getElementById('wrap'),overlay=document.getElementById('overlay'),startBtn=document.getElementById('start'),title=document.getElementById('title'),msg=document.getElementById('msg'),goalsEl=document.getElementById('goals'),streakEl=document.getElementById('streak'),bestEl=document.getElementById('best');let W,H,dpr=1,ball,keeper,aim=null,goals=0,streak=0,best=Number(localStorage.getItem('gr8_best_'+ID)||0),running=false,shooting=false;bestEl.textContent=best;function resize(){const r=canvas.getBoundingClientRect();dpr=Math.min(2,devicePixelRatio||1);canvas.width=Math.floor(r.width*dpr);canvas.height=Math.floor(r.height*dpr);W=canvas.width;H=canvas.height;resetBall()}function resetBall(){ball={x:W/2,y:H-70*dpr,r:14*dpr,vx:0,vy:0};keeper={x:W/2,y:92*dpr,w:90*dpr,h:24*dpr,dir:1}}function start(){goals=0;streak=0;running=true;shooting=false;resetBall();overlay.classList.add('hidden');hud()}function hud(){goalsEl.textContent=goals;streakEl.textContent=streak;bestEl.textContent=best}function shoot(x,y){if(!running||shooting)return;const dx=ball.x-x,dy=ball.y-y;ball.vx=dx*.045;ball.vy=dy*.045;shooting=true;aim=null}function update(){if(!running)return;keeper.x+=keeper.dir*(3.2+goals*.18)*dpr;if(keeper.x<85*dpr||keeper.x>W-85*dpr)keeper.dir*=-1;if(shooting){ball.x+=ball.vx;ball.y+=ball.vy;ball.vy+=.05*dpr;if(ball.y<keeper.y+keeper.h&&Math.abs(ball.x-keeper.x)<keeper.w/2&&Math.abs(ball.y-keeper.y)<keeper.h){streak=0;shooting=false;resetBall()}else if(ball.y<55*dpr&&ball.x>70*dpr&&ball.x<W-70*dpr){goals++;streak++;if(streak>best){best=streak;localStorage.setItem('gr8_best_'+ID,best)}shooting=false;resetBall();hud();try{parent.postMessage({source:'GR8_GAMZ',type:'score',game:ID,score:goals,best},'*')}catch(e){}}else if(ball.x<0||ball.x>W||ball.y>H||ball.y<0){streak=0;shooting=false;resetBall();hud()}}}function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#06210f';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(53,255,141,.18)';ctx.lineWidth=2*dpr;for(let x=0;x<W;x+=44*dpr){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}ctx.strokeStyle='#fff';ctx.strokeRect(70*dpr,24*dpr,W-140*dpr,62*dpr);ctx.fillStyle='#ff3df2';ctx.shadowColor='#ff3df2';ctx.shadowBlur=18*dpr;ctx.fillRect(keeper.x-keeper.w/2,keeper.y-keeper.h/2,keeper.w,keeper.h);ctx.shadowColor='#36d7ff';ctx.fillStyle='#fff';ctx.shadowBlur=14*dpr;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;if(aim){ctx.strokeStyle='#35ff8d';ctx.lineWidth=3*dpr;ctx.beginPath();ctx.moveTo(ball.x,ball.y);ctx.lineTo(aim.x,aim.y);ctx.stroke()}}function loop(){update();draw();requestAnimationFrame(loop)}function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*dpr,y:(e.clientY-r.top)*dpr}}resize();addEventListener('resize',resize);startBtn.onclick=start;wrap.addEventListener('pointerdown',e=>{if(!running)start(); const p=pos(e); if(Math.hypot(p.x-ball.x,p.y-ball.y)<80*dpr){aim=p; wrap.setPointerCapture(e.pointerId)} });wrap.addEventListener('pointermove',e=>{if(aim)aim=pos(e)});wrap.addEventListener('pointerup',e=>{if(aim){const p=pos(e);shoot(p.x,p.y)}});addEventListener('keydown',e=>{if(e.code==='Space')start()});requestAnimationFrame(loop)})();</script></body></html>
