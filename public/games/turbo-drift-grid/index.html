<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/><title>Turbo Drift Grid | GR8 GAMZ</title><style>
:root{--green:#35ff8d;--cyan:#36d7ff;--pink:#ff3df2;--text:#f5fff9;--muted:#9aa6b2;--line:rgba(255,255,255,.14)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#030407;color:var(--text);font-family:Inter,system-ui,Segoe UI,sans-serif;touch-action:none;user-select:none}.game{height:100%;display:flex;flex-direction:column;gap:8px;padding:10px;background:radial-gradient(circle at top,#101c35,#030407 64%,#000)}.hud{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.06);padding:8px 10px}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.1em}.stat strong{font-size:18px;color:var(--green)}.stage{flex:1;min-height:250px;position:relative;border:1px solid rgba(54,215,255,.35);border-radius:18px;overflow:hidden;background:#03070c}canvas{width:100%;height:100%;display:block;touch-action:none}.touch{display:grid;grid-template-columns:1fr 1fr;gap:10px}.touch button,.overlay button{min-height:60px;border-radius:18px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:var(--text);font-size:28px;font-weight:950}.overlay button{font-size:16px;color:#001006;background:linear-gradient(135deg,var(--green),var(--cyan));border-color:rgba(53,255,141,.5);padding:14px 20px}.overlay{position:absolute;inset:0;display:grid;place-items:center;text-align:center;background:rgba(0,0,0,.73);padding:22px}.overlay[hidden]{display:none}.card{max-width:440px;border:1px solid var(--line);border-radius:24px;background:rgba(8,12,20,.92);padding:22px}h1{margin:0 0 8px;font-size:clamp(28px,8vw,44px);line-height:.95;letter-spacing:-.06em}p{margin:0 0 16px;color:var(--muted);line-height:1.45}.tiny{text-align:center;color:var(--muted);font-size:12px}@media(min-width:760px){.game{padding:14px}.hud,.stage{max-width:760px;width:100%;margin:0 auto}.touch,.tiny{display:none}}
</style></head><body><main class="game" aria-label="Turbo Drift Grid game"><section class="hud"><div class="stat"><span>Distance</span><strong id="score">0</strong></div><div class="stat"><span>Boost</span><strong id="boost">0</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div></section><section class="stage"><canvas id="c"></canvas><div id="overlay" class="overlay"><div class="card"><h1>Turbo Drift Grid</h1><p>Hold the left or right side to steer through the neon grid. Collect boosts, avoid red blockers and stay on the road.</p><button id="start">Start drift</button></div></div></section><section class="touch"><button id="left" aria-label="Steer left">◀ HOLD</button><button id="right" aria-label="Steer right">HOLD ▶</button></section><div class="tiny">Mobile: hold left/right. Desktop: A/D or arrow keys.</div></main><script>
const GAME_ID='turbo-drift-grid',canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),scoreEl=document.getElementById('score'),boostEl=document.getElementById('boost'),bestEl=document.getElementById('best'),overlay=document.getElementById('overlay');let W=420,H=650,scale=1,dpr=1,car,obs,coins,score,boost,best=Number(localStorage.getItem('gr8_best_'+GAME_ID)||0),running=false,over=false,keys={left:false,right:false},spawn=0,last=0;bestEl.textContent=best;
function resize(){const r=canvas.getBoundingClientRect();dpr=Math.min(2,devicePixelRatio||1);canvas.width=Math.max(320,Math.floor(r.width*dpr));canvas.height=Math.max(260,Math.floor(r.height*dpr));scale=Math.min(canvas.width/W,canvas.height/H)}addEventListener('resize',resize,{passive:true});resize();
function reset(){car={x:W/2,y:H-110,vx:0,w:34,h:58};obs=[];coins=[];score=0;boost=0;spawn=0;running=true;over=false;overlay.hidden=true;updateHud()}function updateHud(){scoreEl.textContent=Math.floor(score);boostEl.textContent=boost;bestEl.textContent=best}function end(){over=true;running=false;if(score>best){best=Math.floor(score);localStorage.setItem('gr8_best_'+GAME_ID,best)}window.parent?.postMessage({source:'GR8_GAMZ',type:'score',game:GAME_ID,score:Math.floor(score),best},'*');overlay.querySelector('h1').textContent='Drift ended';overlay.querySelector('p').textContent=`Distance ${Math.floor(score)}. Best ${best}. Tap to race again.`;overlay.querySelector('button').textContent='Race again';overlay.hidden=false;updateHud()}document.getElementById('start').addEventListener('click',reset);['left','right'].forEach(id=>{const b=document.getElementById(id);b.addEventListener('pointerdown',e=>{e.preventDefault();keys[id]=true});['pointerup','pointercancel','pointerleave'].forEach(ev=>b.addEventListener(ev,()=>keys[id]=false))});canvas.addEventListener('pointerdown',e=>{if(!running){reset();return}const x=e.offsetX/canvas.clientWidth;keys[x<.5?'left':'right']=true});['pointerup','pointercancel','pointerleave'].forEach(ev=>canvas.addEventListener(ev,()=>{keys.left=false;keys.right=false}));addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a')keys.left=true;if(e.key==='ArrowRight'||e.key.toLowerCase()==='d')keys.right=true;if(e.code==='Space'&&!running)reset()});addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a')keys.left=false;if(e.key==='ArrowRight'||e.key.toLowerCase()==='d')keys.right=false});
function rects(a,b){return Math.abs(a.x-b.x)<(a.w+b.w)/2&&Math.abs(a.y-b.y)<(a.h+b.h)/2}function tick(dt){if(!running||over)return;const speed=4+Math.min(4,score/850)+(boost>0?1.5:0);score+=dt*.055*speed;spawn-=dt;car.vx+=(keys.left?-0.35:0)+(keys.right?0.35:0);car.vx*=0.9;car.x+=car.vx;if(car.x<78||car.x>W-78)end();if(spawn<=0){spawn=520-Math.min(220,score/8);const lane=[130,210,290][Math.floor(Math.random()*3)];obs.push({x:lane,y:-30,w:54,h:54});if(Math.random()<.7)coins.push({x:[120,210,300][Math.floor(Math.random()*3)],y:-110,r:13})}obs.forEach(o=>o.y+=speed);coins.forEach(c=>c.y+=speed);obs=obs.filter(o=>o.y<H+80);coins=coins.filter(c=>c.y<H+80);obs.forEach(o=>{if(rects(car,o))end()});coins=coins.filter(c=>{if(Math.hypot(car.x-c.x,car.y-c.y)<32){boost+=1;score+=75;return false}return true});if(boost>0&&Math.random()<.012)boost--;updateHud()}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate((canvas.width-W*scale)/2,(canvas.height-H*scale)/2);ctx.scale(scale,scale);ctx.fillStyle='#02060b';ctx.fillRect(0,0,W,H);const roadX=60,roadW=300;ctx.fillStyle='rgba(255,255,255,.035)';ctx.fillRect(roadX,0,roadW,H);ctx.strokeStyle='rgba(54,215,255,.18)';ctx.lineWidth=3;ctx.strokeRect(roadX,0,roadW,H);ctx.lineWidth=1;for(let y=(score%48)-48;y<H;y+=48){ctx.strokeStyle='rgba(53,255,141,.12)';ctx.beginPath();ctx.moveTo(roadX,y);ctx.lineTo(roadX+roadW,y);ctx.stroke()}[roadX+100,roadX+200].forEach(x=>{ctx.strokeStyle='rgba(255,255,255,.12)';ctx.setLineDash([18,18]);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();ctx.setLineDash([])});coins.forEach(c=>{ctx.shadowColor='#35ff8d';ctx.shadowBlur=18;ctx.fillStyle='#35ff8d';ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill()});obs.forEach(o=>{ctx.shadowColor='#ff3d68';ctx.shadowBlur=18;ctx.fillStyle='#ff3d68';ctx.fillRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h)});ctx.save();ctx.translate(car.x,car.y);ctx.rotate(car.vx*.025);ctx.shadowColor='#36d7ff';ctx.shadowBlur=20;ctx.fillStyle='#36d7ff';ctx.fillRect(-car.w/2,-car.h/2,car.w,car.h);ctx.fillStyle='#001018';ctx.fillRect(-10,-18,20,22);ctx.restore();ctx.shadowBlur=0;ctx.restore()}
function loop(t){const dt=Math.min(32,t-last||16);last=t;tick(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script></body></html>
