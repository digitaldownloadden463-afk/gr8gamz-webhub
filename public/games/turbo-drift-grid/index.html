<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/><title>Turbo Drift Grid | GR8 GAMZ</title><style>:root{--green:#35ff8d;--cyan:#36d7ff;--pink:#ff3df2;--text:#f5fff9;--muted:#99a6b3}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at top,#101d2b,#040407 55%,#000);color:var(--text);font-family:Inter,system-ui,sans-serif;touch-action:none;user-select:none}.game{height:100%;display:flex;flex-direction:column;gap:8px;padding:10px}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.stat{border:1px solid rgba(53,255,141,.3);background:rgba(255,255,255,.06);border-radius:14px;padding:8px 10px}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.11em}.stat strong{color:var(--green);font-size:18px}.wrap{flex:1;min-height:280px;position:relative;border:1px solid rgba(53,255,141,.38);border-radius:18px;overflow:hidden;background:#020304}canvas{width:100%;height:100%;display:block}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.66);z-index:5;text-align:center;padding:24px}.overlay.hidden{display:none}.card{max-width:430px;border:1px solid rgba(53,255,141,.3);border-radius:24px;padding:22px;background:rgba(8,12,18,.9)}h1{margin:0 0 8px;font-size:clamp(30px,8vw,52px);letter-spacing:-.06em;line-height:.95}p{color:var(--muted);line-height:1.45}button{min-height:50px;border:0;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--cyan));color:#001006;font-weight:950;padding:14px 20px}.zones{display:grid;grid-template-columns:1fr 1fr;gap:8px}.zones button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--text)}.tiny{text-align:center;color:var(--muted);font-size:12px}@media(min-width:720px){.hud{max-width:680px;width:100%;margin:0 auto}.wrap{max-width:900px;width:100%;margin:0 auto}.zones{display:none}}</style></head><body><main class="game"><section class="hud"><div class="stat"><span>Distance</span><strong id="dist">0</strong></div><div class="stat"><span>Boost</span><strong id="boost">0</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div></section><section class="wrap" id="wrap"><canvas id="c"></canvas><div id="overlay" class="overlay"><div class="card"><h1 id="title">Turbo Drift Grid</h1><p id="msg">Hold the left or right side of the screen to steer. Avoid barriers and collect boost.</p><button id="start">Start race</button></div></div></section><section class="zones"><button id="left">Hold left</button><button id="right">Hold right</button></section><div class="tiny">Mobile: hold left/right side. Desktop: A/D or arrow keys.</div></main><script>
(function(){const ID='turbo-drift-grid',canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),wrap=document.getElementById('wrap'),overlay=document.getElementById('overlay'),startBtn=document.getElementById('start'),title=document.getElementById('title'),msg=document.getElementById('msg'),distEl=document.getElementById('dist'),boostEl=document.getElementById('boost'),bestEl=document.getElementById('best');let W,H,dpr=1,car,obs=[],orbs=[],dist=0,boost=0,best=Number(localStorage.getItem('gr8_best_'+ID)||0),running=false,steer=0,spawn=0,speed=4,last=performance.now();bestEl.textContent=best;function resize(){const r=canvas.getBoundingClientRect();dpr=Math.min(2,devicePixelRatio||1);canvas.width=Math.floor(r.width*dpr);canvas.height=Math.floor(r.height*dpr);W=canvas.width;H=canvas.height;if(car)car.y=H-90*dpr}function start(){car={x:W/2,y:H-90*dpr,w:34*dpr,h:56*dpr};obs=[];orbs=[];dist=0;boost=0;spawn=0;speed=4*dpr;running=true;overlay.classList.add('hidden');hud()}function hud(){distEl.textContent=Math.floor(dist);boostEl.textContent=boost;bestEl.textContent=best}function end(){running=false;if(dist>best){best=Math.floor(dist);localStorage.setItem('gr8_best_'+ID,best)}hud();title.textContent='Crash!';msg.textContent='Distance '+Math.floor(dist)+'. Best '+best+'. Tap to race again.';startBtn.textContent='Race again';overlay.classList.remove('hidden');try{parent.postMessage({source:'GR8_GAMZ',type:'score',game:ID,score:Math.floor(dist),best},'*')}catch(e){}}function collide(a,b){return Math.abs(a.x-b.x)<(a.w+b.w)/2&&Math.abs(a.y-b.y)<(a.h+b.h)/2}function update(){if(!running)return;dist+=.12*speed/dpr;speed+=.002*dpr;car.x+=steer*6*dpr;car.x=Math.max(50*dpr,Math.min(W-50*dpr,car.x));spawn--;if(spawn<=0){spawn=42;const lane=50*dpr+Math.random()*(W-100*dpr);obs.push({x:lane,y:-40*dpr,w:(40+Math.random()*60)*dpr,h:28*dpr});if(Math.random()<.55)orbs.push({x:50*dpr+Math.random()*(W-100*dpr),y:-100*dpr,r:12*dpr})}obs.forEach(o=>o.y+=speed);orbs.forEach(o=>o.y+=speed*.95);obs=obs.filter(o=>o.y<H+80*dpr);orbs=orbs.filter(o=>o.y<H+80*dpr);for(const o of obs){if(collide(car,o)){end();return}}orbs=orbs.filter(o=>{if(Math.abs(car.x-o.x)<car.w/2+o.r&&Math.abs(car.y-o.y)<car.h/2+o.r){boost++;dist+=20;return false}return true});hud()}function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#030608';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(53,255,141,.1)';for(let x=0;x<W;x+=42*dpr){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=(dist*4*dpr)%42*dpr;y<H;y+=42*dpr){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}ctx.strokeStyle='rgba(54,215,255,.42)';ctx.lineWidth=2*dpr;ctx.beginPath();ctx.moveTo(42*dpr,0);ctx.lineTo(42*dpr,H);ctx.moveTo(W-42*dpr,0);ctx.lineTo(W-42*dpr,H);ctx.stroke();ctx.shadowBlur=18*dpr;obs.forEach(o=>{ctx.shadowColor='#ff3df2';ctx.fillStyle='#ff3df2';ctx.fillRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h)});orbs.forEach(o=>{ctx.shadowColor='#35ff8d';ctx.fillStyle='#35ff8d';ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill()});if(car){ctx.shadowColor='#36d7ff';ctx.fillStyle='#36d7ff';ctx.beginPath();ctx.roundRect(car.x-car.w/2,car.y-car.h/2,car.w,car.h,8*dpr);ctx.fill();ctx.fillStyle='#fff';ctx.fillRect(car.x-8*dpr,car.y-20*dpr,16*dpr,12*dpr)}ctx.shadowBlur=0}function loop(t){last=t;update();draw();requestAnimationFrame(loop)}function setFromPointer(e,on){const rect=wrap.getBoundingClientRect();steer=on?((e.clientX-rect.left)<rect.width/2?-1:1):0}resize();addEventListener('resize',resize);startBtn.onclick=start;wrap.addEventListener('pointerdown',e=>{if(!running)start();setFromPointer(e,true)});wrap.addEventListener('pointermove',e=>{if(running&&e.buttons)setFromPointer(e,true)});wrap.addEventListener('pointerup',()=>steer=0);wrap.addEventListener('pointercancel',()=>steer=0);document.getElementById('left').onpointerdown=e=>{e.preventDefault();if(!running)start();steer=-1};document.getElementById('right').onpointerdown=e=>{e.preventDefault();if(!running)start();steer=1};['left','right'].forEach(id=>document.getElementById(id).onpointerup=()=>steer=0);addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='a'||k==='arrowleft')steer=-1;if(k==='d'||k==='arrowright')steer=1;if(k===' ')start()});addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(['a','d','arrowleft','arrowright'].includes(k))steer=0});requestAnimationFrame(loop)})();</script></body></html>
