<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Lava Tile Escape</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050507;color:#f8fafc;font-family:Arial,Helvetica,sans-serif;touch-action:none;user-select:none}canvas{position:fixed;inset:0;width:100%;height:100%;background:#050507}.hud{position:fixed;top:10px;left:10px;right:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;z-index:4}.hud div{padding:9px;border:1px solid rgba(53,255,141,.25);border-radius:14px;background:rgba(5,5,7,.70);backdrop-filter:blur(8px)}.hud span{display:block;color:#a1a1aa;font-size:.68rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase}.hud b{display:block;color:#35ff8d;font-size:1.1rem}.overlay{position:fixed;inset:0;z-index:10;display:grid;place-items:center;padding:18px;background:linear-gradient(180deg,rgba(5,5,7,.9),rgba(5,5,7,.74));text-align:center}.card{width:min(900px,94vw);border:1px solid rgba(53,255,141,.25);border-radius:30px;padding:clamp(22px,4vw,44px);background:radial-gradient(circle at 0 0,rgba(53,255,141,.18),transparent 18rem),radial-gradient(circle at 100% 0,rgba(255,47,125,.16),transparent 18rem),rgba(13,13,19,.91);box-shadow:0 30px 100px #000}.k{display:inline-flex;color:#35ff8d;border:1px solid rgba(53,255,141,.24);background:rgba(53,255,141,.08);border-radius:999px;padding:7px 10px;font-weight:900;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase}h1{font-size:clamp(2.1rem,9vw,5.2rem);line-height:.88;letter-spacing:-.075em;margin:15px 0}p{color:#a1a1aa;line-height:1.55}.actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:18px}button{border:0;border-radius:999px;min-height:46px;padding:0 20px;font-weight:900;cursor:pointer}.primary{background:#35ff8d;color:#041008}.secondary{background:rgba(255,255,255,.07);color:#fff;border:1px solid rgba(255,255,255,.14)}.toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;color:white;font-weight:900;font-size:clamp(2rem,8vw,5rem);text-shadow:0 0 30px #35ff8d;opacity:0}.toast.show{animation:pop .7s ease}@keyframes pop{0%{opacity:0;transform:translate(-50%,-40%) scale(.8)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.06)}100%{opacity:0;transform:translate(-50%,-72%) scale(1)}}@media(max-width:680px){.hud{grid-template-columns:repeat(2,1fr)}.card{padding:20px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div><span>Score</span><b id="score">0</b></div><div><span>Best</span><b id="best">0</b></div><div><span>Run</span><b id="time">0s</b></div><div><span>Mode</span><b id="mode">V20</b></div></div><div id="toast" class="toast"></div><div id="overlay" class="overlay"><div class="card"><span class="k">GR8 V20 premium drop</span><h1>Lava Tile Escape</h1><p>Hop across safe neon tiles, dodge lava cracks and reach the escape portal.</p><div class="actions"><button class="primary" id="start">Start run</button><button class="secondary" id="how">How to play</button></div><p id="help" style="display:none">Mobile: swipe or tap adjacent tiles • Reach the portal • Desktop: arrow keys</p></div></div><script>const CFG={"id": "lava-tile-escape", "name": "Lava Tile Escape", "mode": "lava", "label": "Swipe tiles"};</script><script src="game.js"></script></body></html>
